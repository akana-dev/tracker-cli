name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          mkdir -p build
          COMMIT=${GITHUB_SHA::8}
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LDFLAGS="-s -w \
            -X tracker/internal/version.Version=${{ steps.get_version.outputs.VERSION }} \
            -X tracker/internal/version.Commit=$COMMIT \
            -X tracker/internal/version.BuildDate=$BUILD_DATE"
          
          echo "Building for linux/amd64..."
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o build/tracker-linux-amd64 ./cmd/tracker
          
          echo "Building for linux/arm64..."
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o build/tracker-linux-arm64 ./cmd/tracker
          
          echo "Building for windows/amd64..."
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o build/tracker-windows-amd64.exe ./cmd/tracker
          
          echo "Building for darwin/amd64..."
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o build/tracker-darwin-amd64 ./cmd/tracker
          
          echo "Building for darwin/arm64..."
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o build/tracker-darwin-arm64 ./cmd/tracker

      - name: Generate checksums
        run: |
          cd build
          sha256sum * > checksums.txt
          echo "Generated checksums:"
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          files: |
            build/tracker-linux-amd64
            build/tracker-linux-arm64
            build/tracker-windows-amd64.exe
            build/tracker-darwin-amd64
            build/tracker-darwin-arm64
            build/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          fail_on_unmatched_files: true